apiVersion: apps/v1
kind: Deployment
metadata:
  name: tg-bot

spec:
  replicas: {{ .Values.replicas }}

  selector:
    matchLabels:
      app: tg-bot

  template:
    metadata:
      labels:
        app: tg-bot

    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox
          command:
            - sh
            - -c
            - until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done

      containers:
        - name: tg-bot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tg-bot-secret
                  key: TELEGRAM_BOT_TOKEN

            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "{{ .Values.kafka.bootstrapServers }}"

            - name: KAFKA_TOPIC
              value: "{{ .Values.kafka.topic }}"

            - name: TASK_API_URL
              value: "http://ktor-api:8080"  