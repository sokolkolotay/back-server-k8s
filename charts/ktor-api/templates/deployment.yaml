apiVersion: apps/v1
kind: Deployment
metadata:
  name: ktor-api
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: ktor-api
  template:
    metadata:
      labels:
        app: ktor-api
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done
        - name: wait-for-kafka
          image: busybox
          command:
            - sh
            - -c
            - until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done
      containers:
        - name: ktor-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ktor-api-config
          env:
            - name: DATABASE_PASSWORD
              value: "{{ .Values.database.password }}"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15