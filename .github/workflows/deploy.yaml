name: Deploy Helm Charts

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Copy charts to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "charts"
          target: "~/back-server-k8s"

      - name: Deploy to k3s via Helm
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            export KUBECONFIG=$HOME/.kube/config

            echo "Deploy PostgreSQL..."
            helm upgrade --install postgres ~/back-server-k8s/charts/postgres

            echo "Deploy Kafka..."
            helm upgrade --install kafka ~/back-server-k8s/charts/kafka

            echo "Deploy Ktor API..."
            helm upgrade --install ktor-api ~/back-server-k8s/charts/ktor-api

            echo "Deploy Telegram Bot..."
            helm upgrade --install tg-bot ~/back-server-k8s/charts/tg-bot

            echo "Pods status:"
            kubectl get pods -o wide
