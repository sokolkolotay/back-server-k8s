name: Deploy Helm Charts

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy charts to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "charts/"
          target: "~/back-server-k8s/"

      - name: Deploy all charts to k3s
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            export KUBECONFIG=~/.kube/config
            mkdir -p ~/back-server-k8s
            echo "=== Deploy PostgreSQL ==="
            helm upgrade --install postgres ~/back-server-k8s/charts/postgres \
              --create-namespace \
              --wait \
              --atomic
            echo "=== Deploy Kafka ==="
            helm upgrade --install kafka ~/back-server-k8s/charts/kafka \
              --wait \
              --atomic
            echo "=== Deploy Ktor API ==="
            helm upgrade --install ktor-api ~/back-server-k8s/charts/ktor-api \
              --wait \
              --atomic
            echo "=== Deploy Telegram Bot ==="
            helm upgrade --install tg-bot ~/back-server-k8s/charts/tg-bot \
              --wait \
              --atomic
            echo "=== Rollout status ==="
            kubectl rollout status deployment/postgres --timeout=180s
            kubectl rollout status deployment/kafka --timeout=180s
            kubectl rollout status deployment/ktor-api --timeout=180s
            kubectl rollout status deployment/tg-bot --timeout=180s
            echo "=== Pods ==="
            kubectl get pods -o wide
            echo "=== Helm Releases ==="
            helm list
