name: Deploy Helm Charts

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy charts to VPS
        run: |
          scp -r ./charts ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/back-server-k8s/

      - name: Deploy to k3s
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            export KUBECONFIG=$HOME/.kube/config

            helm upgrade --install postgres ~/back-server-k8s/charts/postgres
            helm upgrade --install kafka ~/back-server-k8s/charts/kafka
            helm upgrade --install ktor-api ~/back-server-k8s/charts/ktor-api
            helm upgrade --install tg-bot ~/back-server-k8s/charts/tg-bot

            kubectl rollout status deployment/postgres
            kubectl rollout status deployment/kafka
            kubectl rollout status deployment/ktor-api
            kubectl rollout status deployment/tg-bot

            kubectl get pods -o wide
          EOF
